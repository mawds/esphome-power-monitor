esphome:
  name: powermonitor
  friendly_name: PowerMonitor


esp32:
  board: esp32-c6-devkitc-1
  framework:
    type: esp-idf

# Enable logging
logger:

# Enable Home Assistant API
api:
  encryption:
    key: !secret ha_key

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "Powermonitor Fallback Hotspot"
    password: !secret fallback_hotspot

captive_portal:
    
  
sensor:
  - platform: pulse_meter
    name: 'Electricity'
    internal_filter: 30us
    internal_filter_mode: PULSE
    id: sensor_pulse_meter_electric 
    unit_of_measurement: 'W'
    device_class: power
    state_class: measurement
    accuracy_decimals: 3
    pin: 
      number: GPIO10
      mode:
        input: true
        pullup: true
    filters:
      - multiply: 60 
      - lambda: |-
          if (x > 20000) {
            return {};  
          }
          return x;
      #- throttle_average: 5s
      - filter_out: NaN
          
    total:
      name: "Electricity Total"
      unit_of_measurement: "kWh"
      device_class: energy
      state_class: total_increasing
      accuracy_decimals: 3
      filters:
        - multiply: 0.001  # (1/1000 pulses per kWh)


  - platform: pulse_meter
    name: 'Gas'
    internal_filter: 250ms
    id: sensor_pulse_meter_gas 
    unit_of_measurement: 'W'
    device_class: power
    state_class: measurement
    accuracy_decimals: 5
    pin: 
      number: GPIO11
      mode:
        input: true
        pullup: false 
    filters:
      - multiply: 5440
    total:
      name: "Gas Total"
      unit_of_measurement: "kWh"
      device_class: energy
      state_class: total_increasing
      accuracy_decimals: 3
      filters:
        - multiply: 0.110219

